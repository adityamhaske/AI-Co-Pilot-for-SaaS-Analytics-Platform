version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "6001:6001"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - /app/.venv
      
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:6001
    volumes:
      - ./frontend:/app
      - /app/node_modules
